name: Fantasy Sphere Source Probe

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/fantasy-source-probe.yml"

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: cloudflare-worker

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Read sitemap index once
        run: npm run probe-fantasy-sitemap

      - name: Upload sitemap report
        uses: actions/upload-artifact@v4
        with:
          name: fantasy-sitemap-probe
          path: cloudflare-worker/fantasy-sitemap-probe.json
          if-no-files-found: error
          retention-days: 7
