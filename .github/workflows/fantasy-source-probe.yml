name: Final Corrected Source Audit

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/fantasy-source-probe.yml"

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: cloudflare-worker

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Run corrected source audit once
        run: npm run live-audit

      - name: Upload final audit report
        uses: actions/upload-artifact@v4
        with:
          name: tcg-final-corrected-audit
          path: cloudflare-worker/audit-report.json
          if-no-files-found: error
          retention-days: 7
