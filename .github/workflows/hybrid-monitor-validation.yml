name: Hybrid Monitor Validation

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/hybrid-monitor-validation.yml"
      - "cloudflare-worker/config/**"
      - "cloudflare-worker/src/**"
      - "cloudflare-worker/scripts/poll.ts"
      - "cloudflare-worker/package.json"

permissions:
  contents: read

jobs:
  validate-hybrid-monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    defaults:
      run:
        working-directory: cloudflare-worker

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: cloudflare-worker/package.json

      - name: Install dependencies
        run: npm install

      - name: Run silent hybrid baseline
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_KV_NAMESPACE: tcg-watch-state
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          MONITOR_MODE: baseline
        run: npm run monitor
