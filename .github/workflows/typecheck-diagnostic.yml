name: TypeScript Diagnostic

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/typecheck-diagnostic.yml"

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cloudflare-worker
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install
        run: npm install
      - name: TypeScript diagnostic
        id: typecheck
        continue-on-error: true
        run: npm run typecheck 2>&1 | tee typecheck.log
      - name: Upload diagnostic
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-diagnostic
          path: cloudflare-worker/typecheck.log
          retention-days: 1
