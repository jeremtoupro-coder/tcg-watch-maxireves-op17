name: Hybrid Monitor Report

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/hybrid-monitor-report.yml"

permissions:
  contents: read

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: cloudflare-worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install
      - name: Run silent monitor
        run: npm run monitor
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_KV_NAMESPACE: tcg-watch-state
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          MONITOR_MODE: baseline
      - uses: actions/upload-artifact@v4
        with:
          name: hybrid-monitor-report
          path: cloudflare-worker/monitor-report.json
          if-no-files-found: error
          retention-days: 1
