name: Fantasy Catalogue Diagnostic

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/discord-live-once.yml"

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: cloudflare-worker
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install
        run: npm install
      - name: Collect catalogue data
        run: npx tsx scripts/probe-fantasy-sphere.ts
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: fantasy-catalogue-diagnostic
          path: cloudflare-worker/fantasy-sphere-probe.json
          retention-days: 1
