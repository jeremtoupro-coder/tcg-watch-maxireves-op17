name: TCG Watch - Hybrid Monitor

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Mode d'exécution"
        required: false
        default: "live"
        type: choice
        options:
          - live
          - baseline
  push:
    branches:
      - cloudflare-workers-audit
    paths:
      - ".github/workflows/watch-maxireves.yml"
      - "cloudflare-worker/config/**"
      - "cloudflare-worker/src/**"
      - "cloudflare-worker/scripts/poll.ts"
      - "cloudflare-worker/package.json"

permissions:
  contents: read

concurrency:
  group: tcg-watch-hybrid-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    defaults:
      run:
        working-directory: cloudflare-worker

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: cloudflare-worker/package.json

      - name: Install dependencies
        run: npm install

      - name: Validate code on configuration changes
        if: github.event_name == 'push'
        run: |
          npm run typecheck
          npm test

      - name: Monitor every configured store
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_KV_NAMESPACE: tcg-watch-state
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          MONITOR_MODE: ${{ github.event_name == 'push' && 'baseline' || inputs.mode || 'live' }}
        run: npm run monitor
