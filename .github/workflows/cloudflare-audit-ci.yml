name: Cloudflare Audit CI

on:
  push:
    branches:
      - cloudflare-workers-audit
  pull_request:
    branches:
      - main
    paths:
      - "cloudflare-worker/**"
      - ".github/workflows/cloudflare-audit-ci.yml"

permissions:
  contents: read

concurrency:
  group: cloudflare-audit-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: cloudflare-worker

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: TypeScript check
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Wrangler dry run
        run: npx wrangler deploy --dry-run
