name: Cloudflare Audit CI

on:
  push:
    branches:
      - cloudflare-workers-audit
  pull_request:
    branches:
      - main
    paths:
      - "cloudflare-worker/**"
      - ".github/workflows/cloudflare-audit-ci.yml"

permissions:
  contents: read

concurrency:
  group: cloudflare-audit-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: cloudflare-worker

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: TypeScript check
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Wrangler dry run
        run: npx wrangler deploy --dry-run

      - name: One-shot live source audit
        if: github.event_name == 'pull_request'
        run: npm run live-audit

      - name: Upload live audit report
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: tcg-live-audit-report
          path: cloudflare-worker/audit-report.json
          if-no-files-found: error
          retention-days: 7
