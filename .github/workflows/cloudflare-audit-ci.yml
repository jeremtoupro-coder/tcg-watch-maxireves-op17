name: Cloudflare Audit CI

on:
  push:
    branches:
      - cloudflare-workers-audit
  pull_request:
    branches:
      - main
    paths:
      - "cloudflare-worker/**"
      - ".github/workflows/cloudflare-audit-ci.yml"

permissions:
  contents: read

concurrency:
  group: cloudflare-audit-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: cloudflare-worker

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: TypeScript check
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Wrangler dry run
        run: npx wrangler deploy --dry-run

  deploy-preview:
    if: >-
      github.event_name == 'push' &&
      contains(github.event.head_commit.message, '[deploy-preview]')
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: cloudflare-worker

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Generate KV-aware deployment config
        run: npm run generate-deploy-config
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_KV_NAMESPACE: tcg-watch-state
          DEPLOY_MONITORING_ENABLED: "false"
          DEPLOY_WRITE_STATE: "false"
          DEPLOY_DISCORD_MODE: dry-run

      - name: Deploy safe preview
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  seed-baseline:
    if: >-
      github.event_name == 'push' &&
      contains(github.event.head_commit.message, '[seed-baseline]')
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: cloudflare-worker

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Seed silent baseline in Cloudflare KV
        run: npm run seed-baseline
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_KV_NAMESPACE: tcg-watch-state

      - name: Upload baseline report
        uses: actions/upload-artifact@v4
        with:
          name: tcg-kv-baseline-report
          path: cloudflare-worker/baseline-report.json
          if-no-files-found: error
          retention-days: 7

  simulate-change:
    if: >-
      github.event_name == 'push' &&
      contains(github.event.head_commit.message, '[simulate-change]')
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: cloudflare-worker

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Simulate a real KV return in stock
        run: npm run simulate-change
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_KV_NAMESPACE: tcg-watch-state

      - name: Upload simulation report
        uses: actions/upload-artifact@v4
        with:
          name: tcg-change-simulation-report
          path: cloudflare-worker/change-simulation-report.json
          if-no-files-found: error
          retention-days: 7

  test-discord-live:
    if: >-
      github.event_name == 'push' &&
      contains(github.event.head_commit.message, '[test-discord-live]')
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: cloudflare-worker

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Send exactly one Discord test alert
        run: npm run simulate-change
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_KV_NAMESPACE: tcg-watch-state
          DISCORD_MODE: live
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

      - name: Upload live Discord test report
        uses: actions/upload-artifact@v4
        with:
          name: tcg-live-discord-test-report
          path: cloudflare-worker/change-simulation-report.json
          if-no-files-found: error
          retention-days: 7
